<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copubara · AI Growth Agent · Copute.ai</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { min-height: 100vh; background: #0a0a0f; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    const API_ENDPOINT = "/api/audit";

    const AMBER = "#b44fe8";
    const COPU_AMBER = "#c97d2e";
    const CYAN = "#22d3ee";
    const MARKETS = ["Singapore","Malaysia","Indonesia","Thailand","Vietnam","Philippines","Hong Kong","China","APAC broadly","Global"];
    const GOALS = ["More leads","More online sales","Brand awareness","Community building","Enterprise / B2B","APAC expansion"];
    const CHANNELS = ["Instagram","Facebook","TikTok","WhatsApp","WeChat","LinkedIn","Google / SEO","Email","Grab / Lazada","Physical / offline"];
    const GRADE_SHORT = s => s<=30?"Broken":s<=55?"Leaking":s<=75?"Functional":s<=90?"Strong":"Exceptional";
    const GRADE_COLOR = s => s<=30?"#ff3b3b":s<=55?"#ff8c00":s<=75?"#f5c842":s<=90?"#4ade80":CYAN;

    const SYSTEM_PROMPT = `You are Copubara — the AI growth execution agent of Copute.ai. Sharp, witty, APAC-native. Never generic. Never hallucinate.

Score across FOUR dimensions (25% each). Overall = simple average.
1. LEAD CAPTURE — attracting and converting prospects, online or offline.
2. APAC READINESS — regional positioning, localisation, channel fit.
3. TRUST & CLARITY — credibility, brand consistency, value communication.
4. AI SEARCH VISIBILITY — findability on ChatGPT, Perplexity, Claude, Google AI Overviews, Gemini, voice AI.

Grade: 0-30 Broken, 31-55 Leaking, 56-75 Functional, 76-90 Strong, 91-100 Exceptional.

Return ONLY a single valid JSON object. No markdown. No backticks. No preamble. Start with { and end with }.

Schema:
{
  "overallScore": <integer>,
  "overallSummary": "<2-3 sentences>",
  "roastLine": "<one punchy roast>",
  "scores": [
    {"category": "Lead Capture", "score": <int>, "insight": "<1-2 sentences>"},
    {"category": "APAC Readiness", "score": <int>, "insight": "<1-2 sentences>"},
    {"category": "Trust & Clarity", "score": <int>, "insight": "<1-2 sentences>"},
    {"category": "AI Search Visibility", "score": <int>, "insight": "<1-2 sentences>"}
  ],
  "geoSignals": {
    "aiCrawlerStatus": "<Likely Open|Likely Blocked|Unknown>",
    "topPlatformGap": "<specific platform>",
    "geoQuickWin": "<one action this week>",
    "estimatedAITrafficLoss": "<opportunity description>"
  },
  "topBlockers": [
    {"rank": 1, "title": "<title>", "urgency": "critical", "detail": "<2 sentences>"},
    {"rank": 2, "title": "<title>", "urgency": "high", "detail": "<2 sentences>"},
    {"rank": 3, "title": "<title>", "urgency": "medium", "detail": "<2 sentences>"}
  ],
  "sevenDayPlan": [
    {"day": "Day 1", "channel": "<ch>", "task": "<task>", "why": "<why>"},
    {"day": "Day 2", "channel": "<ch>", "task": "<task>", "why": "<why>"},
    {"day": "Day 3", "channel": "<ch>", "task": "<task>", "why": "<why>"},
    {"day": "Day 4", "channel": "<ch>", "task": "<task>", "why": "<why>"},
    {"day": "Day 5", "channel": "<ch>", "task": "<task>", "why": "<why>"},
    {"day": "Day 6", "channel": "<ch>", "task": "<task>", "why": "<why>"},
    {"day": "Day 7", "channel": "<ch>", "task": "<task>", "why": "<why>"}
  ],
  "recommendedWorkflow": [
    {"step": 1, "title": "<t>", "description": "<d>", "tool": "<tool>"},
    {"step": 2, "title": "<t>", "description": "<d>", "tool": "<tool>"},
    {"step": 3, "title": "<t>", "description": "<d>", "tool": "<tool>"},
    {"step": 4, "title": "<t>", "description": "<d>", "tool": "<tool>"}
  ],
  "shareableHook": "<2-3 sentences including overall score and AI Search Visibility score. End with: Executed by Copubara on Copute community compute. copute.ai>"
}`;

    const LOADING_STEPS = [
      { text: "Connecting to Copute community compute…", detail: "" },
      { text: "Node assigned: SGP-Node-047", detail: "Singapore cluster · community GPU" },
      { text: "Running AI search visibility analysis…", detail: "ChatGPT · Perplexity · Google AIO · Gemini" },
      { text: "Cross-referencing APAC benchmarks…", detail: "12 markets · 8 sectors" },
      { text: "Stress-testing trust signals…", detail: "" },
      { text: "Agent compiling your verdict…", detail: "" }
    ];

    const css = `
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap');
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { background: #0a0a0f; color: #ffffff; font-family: 'IBM Plex Mono', monospace; min-height: 100vh; }
      ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #12101a; } ::-webkit-scrollbar-thumb { background: #b44fe8; }
      @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
      @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
      @keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.06)} }
      .fade-up { animation: fadeUp 0.5s ease forwards; }
      .blink { animation: blink 0.7s infinite; }
      .chip { display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid #2a2040;border-radius:2px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:12px;transition:all 0.15s;background:#12101a;color:#a0a0b8;user-select:none; }
      .chip.active { border-color:#b44fe8;color:#b44fe8;background:rgba(180,79,232,0.08); }
      .chip:hover:not(.active) { border-color:#4a4060;color:#fff; }
      .chip-vis { display:flex;flex-direction:column;gap:2px;padding:10px 16px;border:1px solid #2a2040;border-radius:2px;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all 0.15s;background:#12101a;color:#a0a0b8;user-select:none;width:100%;text-align:left; }
      .chip-vis.active { border-color:#b44fe8;color:#b44fe8;background:rgba(180,79,232,0.08); }
      .btn-primary { background:#b44fe8;color:#fff;border:none;padding:14px 28px;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;cursor:pointer;letter-spacing:0.05em;transition:all 0.15s;text-transform:uppercase; }
      .btn-primary:hover { background:#c55af0; }
      .btn-primary:disabled { opacity:0.4;cursor:not-allowed; }
      .btn-outline { background:transparent;color:#b44fe8;border:1px solid #b44fe8;padding:12px 24px;font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;letter-spacing:0.05em;transition:all 0.15s;text-transform:uppercase; }
      .btn-outline:hover { background:rgba(180,79,232,0.1); }
      .input-field { width:100%;background:#12101a;border:1px solid #2a2040;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:13px;padding:12px 14px;outline:none;transition:border 0.15s; }
      .input-field:focus { border-color:#b44fe8; }
      .input-field::placeholder { color:#3a3050; }
      .tab { padding:10px 20px;background:none;border:none;border-bottom:2px solid transparent;color:#4a4060;font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;transition:all 0.15s; }
      .tab.active { color:#b44fe8;border-bottom-color:#b44fe8; }
      .score-bar-fill { height:100%;transition:width 1.2s cubic-bezier(0.22,1,0.36,1); }
      .urgency-critical{background:#ff3b3b22;color:#ff3b3b;border:1px solid #ff3b3b44;}
      .urgency-high{background:#ff8c0022;color:#ff8c00;border:1px solid #ff8c0044;}
      .urgency-medium{background:#f5c84222;color:#f5c842;border:1px solid #f5c84244;}
      .grid-bg{position:fixed;inset:0;background-image:linear-gradient(#1e1a2e 1px,transparent 1px),linear-gradient(90deg,#1e1a2e 1px,transparent 1px);background-size:60px 60px;opacity:0.2;pointer-events:none;}
    `;

    function ScoreRing({ score }) {
      const r=45, circ=2*Math.PI*r, offset=circ-(score/100)*circ;
      return React.createElement('svg', {width:120,height:120,style:{display:"block",margin:"0 auto"}},
        React.createElement('circle',{cx:60,cy:60,r,fill:"none",stroke:"#1e1a2e",strokeWidth:8}),
        React.createElement('circle',{cx:60,cy:60,r,fill:"none",stroke:"#b44fe8",strokeWidth:8,
          strokeDasharray:circ,strokeDashoffset:offset,strokeLinecap:"butt",transform:"rotate(-90 60 60)",
          style:{transition:"stroke-dashoffset 1.4s cubic-bezier(0.22,1,0.36,1)"}}),
        React.createElement('text',{x:60,y:52,textAnchor:"middle",fill:"#b44fe8",fontSize:22,fontWeight:700,fontFamily:"IBM Plex Mono"},score),
        React.createElement('text',{x:60,y:68,textAnchor:"middle",fill:"#a0a0b8",fontSize:9,fontFamily:"IBM Plex Mono"},GRADE_SHORT(score))
      );
    }

    function ScoreBar({ label, score, insight, delay=0, isCyan=false }) {
      const [w, setW] = useState(0);
      const [vis, setVis] = useState(false);
      const color = isCyan ? CYAN : GRADE_COLOR(score);
      useEffect(()=>{
        const t1=setTimeout(()=>setVis(true),delay);
        const t2=setTimeout(()=>setW(score),delay+100);
        return()=>{clearTimeout(t1);clearTimeout(t2);};
      },[score,delay]);
      return (
        <div style={{marginBottom:20,opacity:vis?1:0,transform:vis?"translateY(0)":"translateY(20px)",transition:"opacity 0.5s ease,transform 0.5s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:12,color:"#a0a0b8",textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</span>
            <span style={{fontSize:12,color,fontWeight:600}}>{score} — {GRADE_SHORT(score)}</span>
          </div>
          <div style={{height:4,background:"#1e1a2e",overflow:"hidden",marginBottom:8}}>
            <div className="score-bar-fill" style={{width:`${w}%`,background:color,height:"100%"}}/>
          </div>
          <p style={{fontSize:11,color:"#4a4060",lineHeight:1.6}}>{insight}</p>
        </div>
      );
    }

    function Chip({label,active,onClick}){
      return <span className={`chip${active?" active":""}`} onClick={onClick}>{label}</span>;
    }

    function Reveal({delay,children}){
      const [vis,setVis]=useState(false);
      useEffect(()=>{const t=setTimeout(()=>setVis(true),delay);return()=>clearTimeout(t);},[delay]);
      return <div style={{opacity:vis?1:0,transform:vis?"translateY(0)":"translateY(20px)",transition:"opacity 0.5s ease,transform 0.5s ease"}}>{children}</div>;
    }

    function Landing({onStart}){
      return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 20px",position:"relative",overflow:"hidden"}}>
          <div className="grid-bg"/>
          <div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"600px",height:"600px",background:"radial-gradient(ellipse,rgba(180,79,232,0.08) 0%,transparent 70%)",pointerEvents:"none"}}/>
          <div style={{textAlign:"center",maxWidth:680,position:"relative",zIndex:1}}>
            <div style={{fontSize:10,color:"#b44fe8",letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:24}}>COPUBARA · AI GROWTH AGENT · COPUTE.AI</div>
            <h1 style={{fontFamily:"Playfair Display,Georgia,serif",fontSize:"clamp(32px,6vw,58px)",lineHeight:1.1,fontWeight:900,marginBottom:12,color:"#fff"}}>
              Your business, audited by <span style={{color:"#b44fe8"}}>AI that executes.</span>
            </h1>
            <p style={{fontSize:14,color:"#a0a0b8",lineHeight:1.8,marginBottom:6}}>Community Compute for real AI execution.</p>
            <p style={{fontSize:13,color:"#4a4060",lineHeight:1.8,maxWidth:560,margin:"0 auto 8px"}}>
              Get your AI Search Visibility score — find out if ChatGPT, Perplexity, Claude, and AI agents can find, cite, and recommend your business.
            </p>
            <p style={{fontSize:12,color:"#3a3050",marginBottom:32}}>Free. No login. Results in 60 seconds.</p>
            <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:48,flexWrap:"wrap"}}>
              {["Lead Capture","APAC Readiness","Trust & Clarity","AI Search Visibility"].map(c=>(
                <span key={c} style={{fontSize:10,color:"#4a4060",border:"1px solid #1e1a2e",padding:"4px 10px",letterSpacing:"0.05em"}}>{c}</span>
              ))}
            </div>
            <button className="btn-primary" onClick={onStart} style={{fontSize:14,padding:"16px 40px"}}>Submit for Roasting →</button>
            <p style={{marginTop:16,fontSize:10,color:"#2a2040",lineHeight:1.8}}>Free. No login. Real AI execution.<br/>The network contributes. The community owns the upside.</p>
          </div>
        </div>
      );
    }

    function Intake({onSubmit}){
      const [step,setStep]=useState(1);
      const [form,setForm]=useState({name:"",url:"",description:"",markets:[],goals:[],channels:[],bottleneck:"",visibility:"public"});
      const set=(k,v)=>setForm(f=>({...f,[k]:v}));
      const toggle=(k,v)=>setForm(f=>({...f,[k]:f[k].includes(v)?f[k].filter(x=>x!==v):[...f[k],v]}));
      return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 20px"}}>
          <div className="grid-bg" style={{opacity:0.15}}/>
          <div style={{width:"100%",maxWidth:580,position:"relative",zIndex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:40}}>
              {[1,2].map(n=>(
                <div key={n} style={{display:"contents"}}>
                  <div style={{width:24,height:24,border:`1px solid ${step>=n?"#b44fe8":"#2a2040"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:step>=n?"#b44fe8":"#2a2040"}}>{n}</div>
                  {n<2&&<div style={{flex:1,height:1,background:step>=2?"#b44fe8":"#1e1a2e"}}/>}
                </div>
              ))}
            </div>
            {step===1&&(
              <div className="fade-up">
                <div style={{fontSize:10,color:"#b44fe8",letterSpacing:"0.15em",marginBottom:16}}>STEP 1 / 2 — BUSINESS BRIEF</div>
                <h2 style={{fontFamily:"Playfair Display,Georgia,serif",fontSize:28,fontWeight:700,marginBottom:32,color:"#fff"}}>Brief the agent.</h2>
                <div style={{display:"flex",flexDirection:"column",gap:16}}>
                  <div>
                    <label style={{fontSize:10,color:"#4a4060",letterSpacing:"0.1em",display:"block",marginBottom:6}}>BUSINESS NAME *</label>
                    <input className="input-field" placeholder="e.g. Kopi Bros" value={form.name} onChange={e=>set("name",e.target.value)}/>
                  </div>
                  <div>
                    <label style={{fontSize:10,color:"#4a4060",letterSpacing:"0.1em",display:"block",marginBottom:4}}>WEBSITE URL <span style={{color:"#b44fe8"}}>✦ unlocks AI Search Visibility score</span></label>
                    <input className="input-field" placeholder="https://yourbusiness.com (optional)" value={form.url} onChange={e=>set("url",e.target.value)}/>
                  </div>
                  <div>
                    <label style={{fontSize:10,color:"#4a4060",letterSpacing:"0.1em",display:"block",marginBottom:6}}>WHAT DO YOU DO? *</label>
                    <textarea className="input-field" placeholder="We sell artisanal coffee subscriptions to remote workers in Southeast Asia…" rows={4} value={form.description} onChange={e=>set("description",e.target.value)} style={{resize:"vertical"}}/>
                  </div>
                </div>
                <div style={{marginTop:32}}>
                  <button className="btn-primary" disabled={!form.name.trim()||!form.description.trim()} onClick={()=>setStep(2)}>Next →</button>
                </div>
              </div>
            )}
            {step===2&&(
              <div className="fade-up">
                <div style={{fontSize:10,color:"#b44fe8",letterSpacing:"0.15em",marginBottom:16}}>STEP 2 / 2 — CONTEXT SIGNALS</div>
                <h2 style={{fontFamily:"Playfair Display,Georgia,serif",fontSize:28,fontWeight:700,marginBottom:32,color:"#fff"}}>Set the operational parameters.</h2>
                <div style={{display:"flex",flexDirection:"column",gap:28}}>
                  <div>
                    <label style={{fontSize:10,color:"#4a4060",letterSpacing:"0.1em",display:"block",marginBottom:10}}>TARGET MARKETS *</label>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{MARKETS.map(m=><Chip key={m} label={m} active={form.markets.includes(m)} onClick={()=>toggle("markets",m)}/>)}</div>
                  </div>
                  <div>
                    <label style={{fontSize:10,color:"#4a4060",letterSpacing:"0.1em",display:"block",marginBottom:10}}>PRIMARY GOAL *</label>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{GOALS.map(g=><Chip key={g} label={g} active={form.goals.includes(g)} onClick={()=>toggle("goals",g)}/>)}</div>
                  </div>
                  <div>
                    <label style={{fontSize:10,color:"#4a4060",letterSpacing:"0.1em",display:"block",marginBottom:10}}>CURRENT CHANNELS</label>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{CHANNELS.map(c=><Chip key={c} label={c} active={form.channels.includes(c)} onClick={()=>toggle("channels",c)}/>)}</div>
                  </div>
                  <div>
                    <label style={{fontSize:10,color:"#4a4060",letterSpacing:"0.1em",display:"block",marginBottom:6}}>BIGGEST BOTTLENECK <span style={{color:"#2a2040"}}>(optional)</span></label>
                    <textarea className="input-field" placeholder="e.g. We get traffic but nobody converts." rows={3} value={form.bottleneck} onChange={e=>set("bottleneck",e.target.value)} style={{resize:"vertical"}}/>
                  </div>
                  <div>
                    <label style={{fontSize:10,color:"#4a4060",letterSpacing:"0.1em",display:"block",marginBottom:10}}>AUDIT VISIBILITY</label>
                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      {[{val:"public",icon:"🌏",main:"Public",sub:"Deploy to Copute network · Earn 2× COPU points"},{val:"private",icon:"🔒",main:"Private",sub:"Keep results to myself"}].map(opt=>(
                        <button key={opt.val} className={`chip-vis${form.visibility===opt.val?" active":""}`} onClick={()=>set("visibility",opt.val)}>
                          <span style={{fontSize:13,fontWeight:600}}>{opt.icon} {opt.main}</span>
                          <span style={{fontSize:10,color:form.visibility===opt.val?"#b44fe8":"#3a3050"}}>{opt.sub}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
                <div style={{display:"flex",gap:12,marginTop:32}}>
                  <button className="btn-outline" onClick={()=>setStep(1)}>← Back</button>
                  <button className="btn-primary" disabled={!form.markets.length||!form.goals.length} onClick={()=>onSubmit(form)}>Run the Audit →</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function Loading(){
      const [idx,setIdx]=useState(0);
      useEffect(()=>{
        const t=setInterval(()=>setIdx(i=>Math.min(i+1,LOADING_STEPS.length-1)),2200);
        return()=>clearInterval(t);
      },[]);
      return (
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:40}}>
          <div className="grid-bg"/>
          <div style={{textAlign:"center",maxWidth:480,position:"relative",zIndex:1}}>
            <div style={{fontSize:56,marginBottom:32,display:"inline-block",animation:"pulse 2s infinite"}}>🦫</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:16}}>
              <div className="blink" style={{width:6,height:6,borderRadius:"50%",background:"#b44fe8"}}/>
              <div style={{fontSize:10,color:"#b44fe8",letterSpacing:"0.2em"}}>COPUTE AGENT EXECUTING</div>
            </div>
            <div style={{fontSize:16,color:"#fff",fontWeight:500,marginBottom:6}}>
              {LOADING_STEPS[idx].text}<span className="blink" style={{color:"#b44fe8"}}>|</span>
            </div>
            {LOADING_STEPS[idx].detail&&<div style={{fontSize:11,color:"#4a4060"}}>{LOADING_STEPS[idx].detail}</div>}
            <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:40}}>
              {LOADING_STEPS.map((_,i)=>(
                <div key={i} style={{width:i<=idx?8:6,height:i<=idx?8:6,borderRadius:"50%",background:i<=idx?"#b44fe8":"#1e1a2e",transition:"all 0.3s ease"}}/>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function Results({data,form,onRestart}){
      const [tab,setTab]=useState("plan");
      const [copied,setCopied]=useState(false);
      const [email,setEmail]=useState("");
      const [emailSent,setEmailSent]=useState(false);
      const geo=data.geoSignals||{};
      const aiScore=data.scores?.[3]?.score??0;
      const rescoreDate=new Date(Date.now()+30*24*60*60*1000).toLocaleDateString("en-SG",{day:"numeric",month:"long",year:"numeric"});
      const crawlerColor=geo.aiCrawlerStatus?.includes("Open")?"#4ade80":geo.aiCrawlerStatus?.includes("Blocked")?"#ff3b3b":"#a0a0b8";
      const mailtoGEO=`mailto:hello@copute.ai?subject=${encodeURIComponent(`AI Visibility Fix: ${form.name}`)}&body=${encodeURIComponent(`Business: ${form.name}\nScore: ${data.overallScore}/100\nAI Search Visibility: ${aiScore}/100\nMarkets: ${form.markets.join(", ")}`) }`;
      const mailtoGlowup=`mailto:hello@copute.ai?subject=${encodeURIComponent(`Community Execution: ${form.name}`)}&body=${encodeURIComponent(`Nominating: ${form.name}\nScore: ${data.overallScore}/100`) }`;

      return (
        <div style={{maxWidth:720,margin:"0 auto",padding:"40px 20px 80px"}}>
          {form.visibility==="public"&&(
            <div style={{background:"rgba(180,79,232,0.06)",border:"1px solid rgba(180,79,232,0.3)",borderLeft:"3px solid #b44fe8",padding:"14px 20px",marginBottom:24}}>
              <div style={{fontSize:13,color:"#fff",fontWeight:500}}>Executed and live. Copubara is deploying your results to the Copute community network.</div>
              <div style={{fontSize:11,color:"#4a4060",marginTop:4}}>Share your result card below.</div>
            </div>
          )}
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:32}}>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:"#b44fe8",letterSpacing:"0.15em"}}>COPUBARA AGENT REPORT // {form.name.toUpperCase()}</div>
              <div style={{fontSize:11,color:"#3a3050",marginTop:2}}>{new Date().toLocaleDateString("en-SG",{day:"numeric",month:"long",year:"numeric"})}</div>
            </div>

          </Reveal>
          <Reveal delay={2900}>
            <div style={{border:"1px solid #1e1a2e",background:"#0a0a0f",marginBottom:24}}>
              <div style={{display:"flex",borderBottom:"1px solid #16122a"}}>
                <button className={`tab${tab==="plan"?" active":""}`} onClick={()=>setTab("plan")}>7-Day Plan</button>

                    <div>
                      <p style={{fontSize:13,color:"#a0a0b8",fontWeight:600,marginBottom:4}}>{d.task}</p>
                      <p style={{fontSize:11,color:"#4a4060",lineHeight:1.6}}>{d.why}</p>
                    </div>

                ))}
                {tab==="workflow"&&(
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:16}}>
                    {(data.recommendedWorkflow||[]).map((w,i)=>(
                      <div key={i} style={{border:"1px solid #1e1a2e",padding:"16px",background:"#12101a"}}>

          </Reveal>
          <Reveal delay={3300}>
            <div style={{border:"1px solid #2a2040",padding:"24px 28px",marginBottom:24,background:"#0a0a0f"}}>
              <div style={{fontSize:10,color:"#4a4060",letterSpacing:"0.1em",marginBottom:16}}>SHAREABLE RESULT</div>
              <div style={{background:"#12101a",border:"1px solid #16122a",padding:"20px",marginBottom:16}}>
                <p style={{fontSize:13,color:"#a0a0b8",lineHeight:1.8}}>{data.shareableHook}</p>
              </div>
              <button className="btn-outline" onClick={()=>navigator.clipboard.writeText(data.shareableHook||"").then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);})} style={{fontSize:11}}>
                {copied?"✓ Copied!":"Copy to Clipboard →"}
              </button>
            </div>
          </Reveal>
          <Reveal delay={3700}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:16,marginBottom:24}}>
              <div style={{border:"1px solid #1e1a2e",padding:"24px",background:"#0a0a0f"}}>
                <div style={{fontSize:10,color:"#b44fe8",letterSpacing:"0.1em",marginBottom:12}}>SCHEDULE RESCORE</div>

                {emailSent?(
                  <p style={{fontSize:11,color:COPU_AMBER}}>✓ Locked in. Rescore on {rescoreDate}.</p>

              <div style={{border:"1px solid #1e1a2e",padding:"24px",background:"#0a0a0f"}}>

                <p style={{fontSize:12,color:"#4a4060",marginBottom:16,lineHeight:1.6}}>40,000+ GPU operators, AI builders and APAC founders. COPU TGE incoming.</p>
                <a href="https://t.me/copute" target="_blank" rel="noreferrer" style={{textDecoration:"none"}}>

                <a href={mailtoGEO} style={{textDecoration:"none"}}>

            <div style={{border:"1px solid #1e1a2e",padding:"24px",background:"#0a0a0f",marginBottom:24}}>
              <div style={{fontSize:10,color:"#b44fe8",letterSpacing:"0.1em",marginBottom:12}}>COMMUNITY EXECUTION VOTE</div>

              <a href={mailtoGlowup} style={{textDecoration:"none"}}>

              Roast another business →

      );

    function App(){
      const [screen,setScreen]=useState("landing");
      const [formData,setFormData]=useState(null);
      const [result,setResult]=useState(null);
      const [error,setError]=useState(null);

      const callAPI=async(form)=>{
        setScreen("loading");
        setError(null);
        const prompt=`Business name: ${form.name}
Website: ${form.url||"Not provided"}
Description: ${form.description}
Target markets: ${form.markets.join(", ")||"Not specified"}
Primary goals: ${form.goals.join(", ")||"Not specified"}
Current channels: ${form.channels.join(", ")||"None specified"}
Biggest bottleneck: ${form.bottleneck||"Not specified"}

Return ONLY a valid JSON object. No markdown. No backticks. Start with { end with }.`;
        try{
          const res=await fetch(API_ENDPOINT,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
              model:"claude-sonnet-4-6",
              max_tokens:4000,
              system:SYSTEM_PROMPT,
              messages:[{role:"user",content:prompt}]
            })
          });
          if(!res.ok) throw new Error(`API error ${res.status}`);
          const data=await res.json();
          const raw=data.content[0].text;
          let clean=raw.replace(/```json|```/g,"").trim();
          const f=clean.indexOf("{"),l=clean.lastIndexOf("}");
          if(f!==-1&&l!==-1) clean=clean.slice(f,l+1);
          let parsed;
          try{ parsed=JSON.parse(clean); }
          catch(e){
            const s=clean.replace(/,\s*"[^"]*"\s*:\s*"[^"]*$/,"").replace(/,?\s*$/,"")+"}";
            parsed=JSON.parse(s);
          }
          setResult(parsed);
          setScreen("results");
        }catch(err){
          setError(err.message||"Something went wrong.");
          setScreen("error");
        }
      };

      return React.createElement(React.Fragment,null,
        React.createElement('style',null,css),
        screen==="landing"&&React.createElement(Landing,{onStart:()=>setScreen("intake")}),
        screen==="intake"&&React.createElement(Intake,{onSubmit:f=>{setFormData(f);callAPI(f);}}),
        screen==="loading"&&React.createElement(Loading,null),
        screen==="results"&&result&&React.createElement(Results,{data:result,form:formData,onRestart:()=>setScreen("landing")}),
        screen==="error"&&React.createElement('div',{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40,textAlign:"center"}},
          React.createElement('div',{style:{fontSize:48,marginBottom:20}},"🦫"),
          React.createElement('div',{style:{fontSize:12,color:"#ff3b3b",marginBottom:12}},"EXECUTION FAILED"),
          React.createElement('p',{style:{fontSize:13,color:"#4a4060",marginBottom:32,maxWidth:400}},error),
          React.createElement('button',{className:"btn-primary",onClick:()=>formData?callAPI(formData):setScreen("landing")},"Retry →"),
          React.createElement('button',{onClick:()=>setScreen("intake"),style:{background:"none",border:"none",color:"#3a3050",fontSize:11,cursor:"pointer",marginTop:16,textDecoration:"underline",fontFamily:"IBM Plex Mono"}},"← Edit inputs")
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
